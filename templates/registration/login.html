{% extends "base.html" %}

{% block title %}Staff login | ISL Glossary{% endblock %}

{% block content %}
<section class="form-page">
  <p class="eyebrow">Staff access</p>
  <h1>Log in</h1>
  <form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button" type="submit">Log in</button>
  </form>
</section>
{% endblock %}
