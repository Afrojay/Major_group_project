<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Sign - ISL Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>ISL Dictionary</h1>
            <nav>
                <a href="index.html" class="btn btn-small">← Back to Home</a>
                <div id="authNav"></div>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>Request a New Sign</h2>
            <p>Can't find a sign in our dictionary? Request it here and our team will review it.</p>
            
            <form id="requestForm">
                <div class="form-group">
                    <label for="word">Word/Phrase *</label>
                    <input type="text" id="word" name="word" required placeholder="e.g., Good Morning">
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="Greetings">Greetings</option>
                        <option value="People">People</option>
                        <option value="Actions">Actions</option>
                        <option value="Education">Education</option>
                        <option value="Food & Drink">Food & Drink</option>
                        <option value="Places">Places</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="description">Description/Context *</label>
                    <textarea id="description" name="description" rows="4" required 
                        placeholder="Provide any additional context or why this sign would be useful"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="contributor_name">Your Name *</label>
                    <input type="text" id="contributor_name" name="contributor_name" required>
                </div>
                
                <div class="form-group">
                    <label for="contributor_email">Your Email *</label>
                    <input type="email" id="contributor_email" name="contributor_email" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Submit Request</button>
                <div id="message" class="message"></div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 ISL Dictionary. Educational prototype.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            
            const formData = {
                word: document.getElementById('word').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                contributor_name: document.getElementById('contributor_name').value,
                contributor_email: document.getElementById('contributor_email').value
            };
            
            try {
                const response = await fetch('/api/requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Request submitted successfully! We will review it soon.';
                    document.getElementById('requestForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Failed to submit request';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please try again.';
            }
        });

        checkAuth();
    </script>
</body>
</html>
